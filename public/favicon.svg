<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <pattern id="d1" width="2.2" height="2.2" patternUnits="userSpaceOnUse">
      <circle cx="1.1" cy="1.1" r="0.9" fill="#1a2550"/>
    </pattern>
    <pattern id="d2" width="1.8" height="1.8" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="0.9" height="0.9" fill="#1a2550"/>
      <rect x="0.9" y="0.9" width="0.9" height="0.9" fill="#1a2550"/>
    </pattern>
    <clipPath id="lh"><rect x="0" y="0" width="16" height="32"/></clipPath>
    <clipPath id="rh"><rect x="16" y="0" width="16" height="32"/></clipPath>
    <clipPath id="disc"><circle cx="16" cy="16" r="15"/></clipPath>
  </defs>

  <circle cx="16" cy="16" r="15" fill="#f4f2ec"/>

  <g clip-path="url(#disc)">
    <g clip-path="url(#lh)">
      <rect x="0" y="0" width="16" height="32" fill="#f4f2ec"/>
      <circle cx="16" cy="16" r="15" fill="url(#d1)" opacity="0.9"/>
    </g>
    <g clip-path="url(#rh)">
      <rect x="16" y="0" width="16" height="32" fill="#f4f2ec"/>
      <circle cx="16" cy="16" r="15" fill="url(#d2)" opacity="0.9"/>
    </g>
  </g>

  <circle cx="16" cy="16" r="15" fill="none" stroke="#1a2550" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="12.5" fill="none" stroke="#1a2550" stroke-width="0.75"/>
  <line x1="16" y1="1" x2="16" y2="31" stroke="#1a2550" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="4.5" fill="#f4f2ec" stroke="#1a2550" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="1.2" fill="#1a2550"/>
</svg>